<html>
  <body style="margin:0;padding:24px;background:#f6f1ea;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#2d241f;">
    <div style="max-width:560px;margin:0 auto;background:#fffaf4;border:1px solid #e1d8cd;border-radius:12px;padding:32px;">
      <p style="margin:0 0 12px;font-size:14px;letter-spacing:0.04em;text-transform:uppercase;color:#8d6d52;">Kindled</p>
      <h1 style="margin:0 0 16px;font-size:28px;line-height:1.2;">Your sign-in code</h1>
      <p style="margin:0 0 20px;font-size:16px;line-height:1.6;">Enter this code in Kindled to finish signing in:</p>
      <div style="margin:0 0 20px;padding:18px 20px;background:#f2e7da;border:1px solid #d9c8b4;border-radius:10px;font-size:32px;font-weight:700;letter-spacing:0.18em;text-align:center;">
        {{ .Token }}
      </div>
      <p style="margin:0;font-size:14px;line-height:1.6;color:#6a584a;">This code expires soon. If you didn't request it, you can ignore this email.</p>
    </div>
  </body>
</html>
